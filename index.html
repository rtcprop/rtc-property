<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RTC Property Management</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#F7F4EE;color:#1C1810;font-family:'DM Sans',sans-serif;font-size:14px;}
input,select,textarea,button{font-family:'DM Sans',sans-serif;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#E2D9CC;border-radius:3px;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fi{animation:fi .2s ease both;}
.hr:hover{background:#FBF6EC!important;}
</style>
</head>
<body>
<div id="root"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#9A8E7A;">Cargando...</div></div>

<script type="module">
// ─── FIREBASE ────────────────────────────────────────────────────────────────
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc }      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { getAuth, signInWithPopup, signOut,
         onAuthStateChanged, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey:            "AIzaSyB7zKfQZ713jgYcTjtXR9EYlcx3bsECErE",
  authDomain:        "rtc-property.firebaseapp.com",
  projectId:         "rtc-property",
  storageBucket:     "rtc-property.firebasestorage.app",
  messagingSenderId: "80464197538",
  appId:             "1:80464197538:web:c65cc3da657625ce39e4fb"
};

const fbApp   = initializeApp(firebaseConfig);
const db      = getFirestore(fbApp);
const auth    = getAuth(fbApp);
const gProvider = new GoogleAuthProvider();

// ─── STATE ───────────────────────────────────────────────────────────────────
let DATA = null, TAB = "dashboard", RATES = null, USER = null;
let _propFiltro = "todas";
let _txFilt = {prop:"",tipo:"",mes:"",q:""};
let _txVista = "propia";
let _showConv = false;

const DEFAULTS = {
  propiedades:[], inquilinos:[], clientes:[], contratos:[],
  transacciones:[], administradores:[],
  tiposGasto:["Agua","Luz","Gas","Expensas","ABL","Inmobiliario","Internet/Teléfono","Mantenimiento","Reparación","Seguro","Honorarios legales","Comisión administrador","Otro gasto"],
  tiposIngreso:["Alquiler","Depósito","Multa por mora","Ajuste de contrato","Otro ingreso"],
};

// ─── AUTH ────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  USER = user;
  if (user) {
    DATA = await loadData(user.uid) || JSON.parse(JSON.stringify(DEFAULTS));
    fetchRates();
    render();
  } else {
    renderLogin();
  }
});

async function loadData(uid) {
  try {
    const snap = await getDoc(doc(db, "usuarios", uid, "datos", "main"));
    return snap.exists() ? snap.data() : null;
  } catch(e) { return null; }
}

async function saveData(d) {
  if (!USER) return;
  try { await setDoc(doc(db, "usuarios", USER.uid, "datos", "main"), d); } catch(e) {}
}

window.loginGoogle = async () => {
  try { await signInWithPopup(auth, gProvider); }
  catch(e) { alert("Error: " + e.message); }
};
window.logoutBtn = async () => { await signOut(auth); };

async function save(nd) {
  DATA = nd;
  await saveData(nd);
  render();
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
const uid    = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const today  = () => new Date().toISOString().slice(0,10);
const fmtD   = d => d ? new Date(d+"T12:00:00").toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"}) : "—";
const fmtM   = (n, cur="ARS") => {
  if (n==null || n==="") return "—";
  const sym = {ARS:"$",USD:"USD",BRL:"R$"}[cur] || cur;
  return sym + " " + Number(n).toLocaleString("es-AR",{minimumFractionDigits:0,maximumFractionDigits:0});
};
const diasH  = d => d ? Math.ceil((new Date(d+"T12:00:00") - new Date()) / 86400000) : null;
const mesStr = () => new Date().toISOString().slice(0,7);
const sum    = (arr, tipo) => arr.filter(t=>t.tipo===tipo).reduce((s,t)=>s+(t.monto||0), 0);
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function h(str) { return String(str||""); } // pass-through for trusted HTML

// ─── RATES ───────────────────────────────────────────────────────────────────
async function fetchRates() {
  try {
    const [a,b,c] = await Promise.allSettled([
      fetch("https://dolarapi.com/v1/dolares/blue").then(r=>r.json()),
      fetch("https://dolarapi.com/v1/dolares/oficial").then(r=>r.json()),
      fetch("https://dolarapi.com/v1/cotizaciones/brl").then(r=>r.json()),
    ]);
    RATES = {
      blue:    a.status==="fulfilled" ? a.value : null,
      oficial: b.status==="fulfilled" ? b.value : null,
      brl:     c.status==="fulfilled" ? c.value : null,
    };
    render();
  } catch(e) {}
}
window.refreshRates = () => fetchRates();

// ─── EXPORTS ─────────────────────────────────────────────────────────────────
window.exportXLSX = async (rowsJSON, headersJSON, filename) => {
  const rows    = JSON.parse(rowsJSON);
  const headers = JSON.parse(headersJSON);
  const XLSX = await import("https://cdn.sheetjs.com/xlsx-0.20.0/package/xlsx.mjs");
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  ws["!cols"] = headers.map(h => ({wch: Math.max(String(h).length, 14)}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Datos");
  XLSX.writeFile(wb, filename + ".xlsx");
};

window.exportPDF = (title, headersJSON, rowsJSON) => {
  const rows    = JSON.parse(rowsJSON);
  const headers = JSON.parse(headersJSON);
  const e = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  let html = "<!DOCTYPE html><html><head><meta charset='utf-8'><title>" + e(title) + "</title>";
  html += "<style>body{font-family:Arial,sans-serif;font-size:11px;color:#1C1810;padding:24px;}";
  html += "h1{font-size:18px;color:#B8922A;margin-bottom:4px;}.sub{font-size:11px;color:#9A8E7A;margin-bottom:16px;}";
  html += "table{width:100%;border-collapse:collapse;}";
  html += "th{background:#FBF6EC;color:#B8922A;font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:7px 10px;text-align:left;border-bottom:2px solid #C8A96E;}";
  html += "td{padding:6px 10px;border-bottom:1px solid #E2D9CC;font-size:11px;}";
  html += "tr:nth-child(even) td{background:#F7F4EE;}@media print{@page{margin:15mm;}}</style></head><body>";
  html += "<h1>" + e(title) + "</h1>";
  html += "<div class='sub'>Generado el " + new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"long",year:"numeric"}) + "</div>";
  html += "<table><thead><tr>";
  headers.forEach(hd => { html += "<th>" + e(hd) + "</th>"; });
  html += "</tr></thead><tbody>";
  rows.forEach(row => {
    html += "<tr>";
    row.forEach(cell => { html += "<td>" + e(cell) + "</td>"; });
    html += "</tr>";
  });
  html += "</tbody></table></body></html>";
  const w = window.open("","_blank");
  if (!w) { alert("Habilitá los popups para exportar PDF"); return; }
  w.document.write(html); w.document.close(); w.focus();
  setTimeout(() => w.print(), 400);
};

// ─── HTML BUILDERS ───────────────────────────────────────────────────────────
// No nested backtick template literals — everything uses string concatenation

function icon(paths, size, color) {
  size  = size  || 16;
  color = color || "currentColor";
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">' + paths + '</svg>';
}

function badge(text, color) {
  color = color || "gold";
  var styles = {
    gold:   "background:#FBF6EC;color:#B8922A",
    green:  "background:#EBF7F0;color:#2D7A4F",
    red:    "background:#FAEAEA;color:#B84040",
    blue:   "background:#EAF0F8;color:#2D5A8E",
    amber:  "background:#FDF3E0;color:#A06010",
    purple: "background:#F0EAFA;color:#6040A0",
    gray:   "background:#F2EDE4;color:#9A8E7A",
  };
  var st = styles[color] || styles.gray;
  return '<span style="' + st + ';padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;">' + esc(text) + '</span>';
}

function card(content, extraStyle) {
  var st = "background:#fff;border:1px solid #E2D9CC;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);" + (extraStyle||"");
  return '<div style="' + st + '">' + content + '</div>';
}

var IST = 'width:100%;background:#fff;border:1px solid #E2D9CC;border-radius:8px;padding:9px 12px;color:#1C1810;font-size:13px;outline:none;';
var LST = 'display:block;color:#9A8E7A;font-size:11px;font-weight:500;margin-bottom:4px;letter-spacing:.4px;text-transform:uppercase;';

function fld(label, inputHtml, span2) {
  return '<div style="grid-column:' + (span2 ? 'span 2' : 'span 1') + '"><label style="' + LST + '">' + esc(label) + '</label>' + inputHtml + '</div>';
}

function g2(content) {
  return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">' + content + '</div>';
}

function exportBar(title, headers, rows, filename) {
  var rj = JSON.stringify(rows).replace(/"/g,"&quot;");
  var hj = JSON.stringify(headers).replace(/"/g,"&quot;");
  var fj = JSON.stringify(filename);
  var btnSt = 'background:transparent;color:#5A5040;border:1px solid #E2D9CC;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;';
  var out = '<div style="display:flex;gap:6px;">';
  out += '<button style="' + btnSt + '" onclick="exportXLSX(&quot;' + rj + '&quot;, &quot;' + hj + '&quot;, ' + fj + ')">⬇ Excel</button>';
  out += '<button style="' + btnSt + '" onclick="exportPDF(&quot;' + esc(title) + '&quot;, &quot;' + hj + '&quot;, &quot;' + rj + '&quot;)">⬇ PDF</button>';
  out += '</div>';
  return out;
}

function thSt() { return 'padding:9px 14px;text-align:left;font-size:10px;color:#9A8E7A;font-weight:500;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;'; }
function tdSt() { return 'padding:10px 14px;font-size:13px;border-top:1px solid #E2D9CC;'; }

function btnPrimary(label, onclick) {
  return '<button onclick="' + onclick + '" style="background:linear-gradient(135deg,#C8A96E,#B8922A);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-weight:500;">' + esc(label) + '</button>';
}
function btnGhost(label, onclick) {
  return '<button onclick="' + onclick + '" style="background:transparent;color:#5A5040;border:1px solid #E2D9CC;border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-weight:500;">' + esc(label) + '</button>';
}
function btnSmall(label, onclick) {
  return '<button onclick="' + onclick + '" style="background:transparent;color:#5A5040;border:1px solid #E2D9CC;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">' + esc(label) + '</button>';
}

function secHdr(title, sub, actionHtml) {
  var out = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;">';
  out += '<div><h2 style="font-family:\'Cormorant Garamond\',serif;font-size:24px;font-weight:600;">' + esc(title) + '</h2>';
  if (sub) out += '<p style="color:#9A8E7A;font-size:12px;margin-top:2px;">' + esc(sub) + '</p>';
  out += '</div>' + (actionHtml||"") + '</div>';
  return out;
}

function formActions(saveCall) {
  var out = '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px;">';
  out += btnGhost("Cancelar", "closeModal()");
  out += '<button onclick="' + saveCall + '" style="background:linear-gradient(135deg,#C8A96E,#B8922A);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-weight:500;">Guardar</button>';
  out += '</div>';
  return out;
}

function selectOpts(items, selVal) {
  var out = "";
  items.forEach(function(it) {
    var val   = typeof it === "object" ? it.id   : it;
    var label = typeof it === "object" ? it.label : it;
    out += '<option value="' + esc(val) + '"' + (val===selVal ? " selected" : "") + '>' + esc(label) + '</option>';
  });
  return out;
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
window.closeModal = () => {
  var m = document.getElementById("modal-overlay");
  if (m) m.remove();
};

function showModal(title, bodyHtml, wide) {
  var m = document.getElementById("modal-overlay");
  if (!m) { m = document.createElement("div"); m.id = "modal-overlay"; document.body.appendChild(m); }
  m.style.cssText = "position:fixed;inset:0;background:rgba(28,24,16,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;";
  var maxW = wide ? "700px" : "540px";
  var out = '<div class="fi" style="background:#fff;border:1px solid #E2D9CC;border-radius:16px;width:100%;max-width:' + maxW + ';max-height:92vh;overflow:auto;box-shadow:0 8px 32px rgba(0,0,0,.12);">';
  out += '<div style="display:flex;align-items:center;justify-content:space-between;padding:18px 24px 14px;border-bottom:1px solid #E2D9CC;position:sticky;top:0;background:#fff;z-index:1;">';
  out += '<h3 style="font-family:\'Cormorant Garamond\',serif;font-size:19px;font-weight:600;">' + esc(title) + '</h3>';
  out += '<button onclick="closeModal()" style="background:none;border:none;color:#9A8E7A;cursor:pointer;display:flex;padding:4px;">' + icon('<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>', 18) + '</button>';
  out += '</div><div style="padding:20px 24px 24px;">' + bodyHtml + '</div></div>';
  m.innerHTML = out;
  m.onclick = e => { if (e.target === m) closeModal(); };
}

// ─── RENDER LOGIN ────────────────────────────────────────────────────────────
function renderLogin() {
  var out = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F7F4EE;">';
  out += '<div style="background:#fff;border:1px solid #E2D9CC;border-radius:20px;padding:48px 40px;text-align:center;max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.08);">';
  out += '<div style="width:52px;height:52px;background:linear-gradient(135deg,#C8A96E,#B8922A);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 4px 12px rgba(184,146,42,.3);">';
  out += icon('<path d="M6 2h12v20H6z"/><path d="M2 22h20"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M8 6h.01"/><path d="M8 10h.01"/><path d="M16 6h.01"/><path d="M16 10h.01"/>', 24, "#fff");
  out += '</div>';
  out += '<div style="font-family:\'Cormorant Garamond\',serif;font-size:28px;font-weight:700;color:#1C1810;letter-spacing:.5px;margin-bottom:4px;">RTC</div>';
  out += '<div style="font-size:11px;color:#9A8E7A;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;">Property Management</div>';
  out += '<button onclick="loginGoogle()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;border:1.5px solid #E2D9CC;border-radius:10px;padding:13px 20px;cursor:pointer;font-size:14px;font-weight:500;color:#1C1810;box-shadow:0 1px 4px rgba(0,0,0,.06);">';
  out += '<svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>';
  out += 'Continuar con Google</button></div></div>';
  document.getElementById("root").innerHTML = out;
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render() {
  if (!DATA) return;

  var alertas = DATA.contratos.filter(function(c) {
    var d = diasH(c.fechaFin);
    return c.vigente && d !== null && d <= 60 && d >= 0;
  });

  var TABS = [
    {id:"dashboard",  l:"Dashboard"},
    {id:"propiedades",l:"Propiedades"},
    {id:"inquilinos", l:"Inquilinos"},
    {id:"clientes",   l:"Clientes"},
    {id:"contratos",  l:"Contratos"},
    {id:"movimientos",l:"Movimientos"},
    {id:"gestores",   l:"Gestores"},
    {id:"config",     l:"Config"},
  ];

  // rates ticker
  var rHtml = "";
  if (RATES) {
    rHtml = '<div style="display:flex;gap:10px;align-items:center;font-size:11px;color:#9A8E7A;flex-wrap:wrap;">';
    if (RATES.blue)    rHtml += '<span>Blue <strong style="color:#B8922A">$' + Math.round(RATES.blue.venta)    + '</strong></span>';
    if (RATES.oficial) rHtml += '<span>Ofic <strong>$'                        + Math.round(RATES.oficial.venta) + '</strong></span>';
    if (RATES.brl)     rHtml += '<span>R$1=<strong style="color:#2D5A8E">$'   + Math.round(RATES.brl.venta)    + '</strong></span>';
    rHtml += '<button onclick="refreshRates()" style="background:none;border:none;cursor:pointer;color:#9A8E7A;display:flex;padding:2px;">' + icon('<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>', 12) + '</button>';
    rHtml += '</div>';
  } else {
    rHtml = '<button onclick="refreshRates()" style="background:none;border:none;cursor:pointer;color:#C8A96E;font-size:11px;">Cargar cotizaciones</button>';
  }

  // alert banner
  var bannerHtml = "";
  if (alertas.length) {
    bannerHtml = '<div style="background:#FDF3E0;border:1px solid rgba(160,96,16,.2);border-radius:12px;padding:12px 18px;margin-bottom:20px;display:flex;gap:12px;">';
    bannerHtml += icon('<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>', 18, "#A06010");
    bannerHtml += '<div style="flex:1;"><div style="color:#A06010;font-weight:500;font-size:13px;margin-bottom:6px;">' + alertas.length + ' contrato' + (alertas.length>1?"s":"") + ' próximos a vencer</div><div style="display:flex;flex-wrap:wrap;gap:6px;">';
    alertas.sort(function(a,b){return diasH(a.fechaFin)-diasH(b.fechaFin);}).forEach(function(c) {
      var p = DATA.propiedades.find(function(x){return x.id===c.propiedadId;});
      var i = DATA.inquilinos.find(function(x){return x.id===c.inquilinoId;});
      var d = diasH(c.fechaFin);
      var bc = d<=15?"red":d<=30?"amber":"gold";
      bannerHtml += '<span onclick="setTab(\'contratos\')" style="cursor:pointer;font-size:12px;color:#5A5040;"><strong>' + esc(p&&p.nombre||"?") + '</strong> · ' + esc(i&&i.nombre||"?") + ' · ' + fmtD(c.fechaFin) + ' ' + badge(d+"d", bc) + '</span>';
    });
    bannerHtml += '</div></div></div>';
  }

  // nav
  var navHtml = "";
  TABS.forEach(function(t) {
    var active = TAB === t.id;
    navHtml += '<button onclick="setTab(\'' + t.id + '\')" style="background:none;border:none;border-bottom:2px solid ' + (active?"#B8922A":"transparent") + ';padding:11px 13px;color:' + (active?"#B8922A":"#9A8E7A") + ';cursor:pointer;font-size:13px;white-space:nowrap;font-family:\'DM Sans\',sans-serif;font-weight:' + (active?500:400) + ';">' + esc(t.l) + '</button>';
  });

  // user area
  var userHtml = "";
  if (alertas.length) {
    userHtml += '<button onclick="setTab(\'contratos\')" style="display:flex;align-items:center;gap:5px;background:#FDF3E0;border:1px solid rgba(160,96,16,.2);border-radius:8px;padding:5px 10px;cursor:pointer;color:#A06010;font-size:12px;font-weight:500;">' + icon('<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>',13) + ' ' + alertas.length + ' alerta' + (alertas.length>1?"s":"") + '</button>';
  }
  if (USER) {
    if (USER.photoURL) userHtml += '<img src="' + esc(USER.photoURL) + '" style="width:28px;height:28px;border-radius:50%;border:1.5px solid #E2D9CC;" referrerpolicy="no-referrer"/>';
    userHtml += '<button onclick="logoutBtn()" style="background:none;border:1px solid #E2D9CC;border-radius:6px;padding:5px 8px;cursor:pointer;color:#9A8E7A;font-size:11px;">Salir</button>';
  }

  var out = '<div style="min-height:100vh;background:#F7F4EE;">';
  // header
  out += '<header style="background:#fff;border-bottom:1px solid #E2D9CC;position:sticky;top:0;z-index:200;">';

// Render only the tab content without rebuilding the full shell
function renderTabOnly() {
  var el = document.getElementById("tab-content");
  if (el) el.innerHTML = renderTab();
}

// ═══════════════════════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════════════════════
function renderTab() {
  if (TAB==="dashboard")   return tabDashboard();
  if (TAB==="propiedades") return tabPropiedades();
  if (TAB==="inquilinos")  return tabInquilinos();
  if (TAB==="clientes")    return tabClientes();
  if (TAB==="contratos")   return tabContratos();
  if (TAB==="movimientos") return tabMovimientos();
  if (TAB==="gestores")    return tabGestores();
  if (TAB==="config")      return tabConfig();
  return "";
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function tabDashboard() {
  var mes      = mesStr();
  var txM      = DATA.transacciones.filter(function(t){return t.fecha&&t.fecha.startsWith(mes);});
  var propias  = DATA.propiedades.filter(function(p){return p.ownership==="propia";});
  var gestidas = DATA.propiedades.filter(function(p){return p.ownership==="gestionada";});

  // Ingresos propias = alquileres + ingresos de propiedades propias
  var txPropias = txM.filter(function(t){return propias.some(function(p){return p.id===t.propiedadId;});});
  // Comisiones = movimientos marcados esComision (de propiedades gestionadas)
  var txComis   = txM.filter(function(t){return t.esComision;});
  // Egresos totales
  var totE      = sum(txM, "egreso");

  // Por moneda — ingresos propias
  var MONS = ["ARS","USD","BRL"];
  function ingPorMoneda(txArr, moneda) { return sum(txArr.filter(function(t){return (t.moneda||"ARS")===moneda && t.tipo==="ingreso";}), "ingreso"); }
  function egPorMoneda(txArr, moneda)  { return sum(txArr.filter(function(t){return (t.moneda||"ARS")===moneda && t.tipo==="egreso";}),  "egreso"); }

  // Tasas de cambio para combinar en ARS
  var blueRate  = RATES && RATES.blue    && RATES.blue.venta    || 0;
  var brlRate   = RATES && RATES.brl     && RATES.brl.venta     || 0;
  function toARS(monto, moneda) {
    if (moneda==="ARS") return monto;
    if (moneda==="USD") return blueRate ? monto * blueRate : 0;
    if (moneda==="BRL") return brlRate  ? monto * brlRate  : 0;
    return 0;
  }

  // Ingresos propias por moneda
  var propIngARS = ingPorMoneda(txPropias, "ARS");
  var propIngUSD = ingPorMoneda(txPropias, "USD");
  var propIngBRL = ingPorMoneda(txPropias, "BRL");
  var propIngTotal = propIngARS + toARS(propIngUSD,"USD") + toARS(propIngBRL,"BRL");

  // Comisiones por moneda
  var comARS = ingPorMoneda(txComis, "ARS");
  var comUSD = ingPorMoneda(txComis, "USD");
  var comBRL = ingPorMoneda(txComis, "BRL");
  var comTotal = comARS + toARS(comUSD,"USD") + toARS(comBRL,"BRL");

  // Ingresos totales (propias + comisiones)
  var ingTotalCombinado = propIngTotal + comTotal;

  // Egresos por moneda
  var egARS = egPorMoneda(txM, "ARS");
  var egUSD = egPorMoneda(txM, "USD");
  var egBRL = egPorMoneda(txM, "BRL");
  var egTotal = egARS + toARS(egUSD,"USD") + toARS(egBRL,"BRL");

  function kpi(label, mainVal, lines, color, wide) {
    color = color || "#B8922A";
    var out = '<div style="background:#fff;border:1px solid #E2D9CC;border-radius:12px;padding:18px 20px;'+(wide?"grid-column:span 2;":"")+'">';
    out += '<div style="color:#9A8E7A;font-size:10px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;">' + esc(label) + '</div>';
    out += '<div style="font-family:\'Cormorant Garamond\',serif;font-size:24px;font-weight:600;color:' + color + ';line-height:1;">' + esc(String(mainVal)) + '</div>';
    if (lines && lines.length) {
      out += '<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;">';
      lines.forEach(function(l){ out += '<span style="font-size:11px;color:#9A8E7A;background:#F2EDE4;border-radius:6px;padding:2px 7px;">'+esc(l)+'</span>'; });
      out += '</div>';
    }
    out += '</div>';
    return out;
  }

  var out = secHdr(new Date().toLocaleDateString("es-AR",{month:"long",year:"numeric"}) + " — Dashboard");

  // Rates panel
  if (RATES) {
    out += card(
      '<div style="padding:16px 20px;"><div style="font-family:\'Cormorant Garamond\',serif;font-size:15px;font-weight:600;margin-bottom:12px;">Cotizaciones del día</div>'
      + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;">'
      + buildRateBox("💵 USD Blue",    RATES.blue,    "#B8922A")
      + buildRateBox("🏦 USD Oficial", RATES.oficial, "#5A5040")
      + buildRateBox("🇧🇷 Real BRL",  RATES.brl,     "#2D5A8E")
      + '</div></div>',
      "margin-bottom:20px;"
    );
  }

  // KPIs principales
  var ingPropLines = [];
  if (propIngARS) ingPropLines.push("$ " + propIngARS.toLocaleString("es-AR",{maximumFractionDigits:0}));
  if (propIngUSD) ingPropLines.push("USD " + propIngUSD.toLocaleString("es-AR",{maximumFractionDigits:0}));
  if (propIngBRL) ingPropLines.push("R$ " + propIngBRL.toLocaleString("es-AR",{maximumFractionDigits:0}));
  if (RATES && (propIngUSD||propIngBRL)) ingPropLines.push("≈ $" + Math.round(propIngTotal).toLocaleString("es-AR") + " ARS total");

  var comLines = [];
  if (comARS) comLines.push("$ " + comARS.toLocaleString("es-AR",{maximumFractionDigits:0}));
  if (comUSD) comLines.push("USD " + comUSD.toLocaleString("es-AR",{maximumFractionDigits:0}));
  if (comBRL) comLines.push("R$ " + comBRL.toLocaleString("es-AR",{maximumFractionDigits:0}));
  if (RATES && (comUSD||comBRL)) comLines.push("≈ $" + Math.round(comTotal).toLocaleString("es-AR") + " ARS total");

  var egLines = [];
  if (egARS) egLines.push("$ " + egARS.toLocaleString("es-AR",{maximumFractionDigits:0}));
  if (egUSD) egLines.push("USD " + egUSD.toLocaleString("es-AR",{maximumFractionDigits:0}));
  if (egBRL) egLines.push("R$ " + egBRL.toLocaleString("es-AR",{maximumFractionDigits:0}));
  if (RATES && (egUSD||egBRL)) egLines.push("≈ $" + Math.round(egTotal).toLocaleString("es-AR") + " ARS total");

  var neto = ingTotalCombinado - egTotal;
  var noRates = !RATES && (propIngUSD||propIngBRL||comUSD||comBRL||egUSD||egBRL);

  out += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:12px;">';
  out += kpi("Ingresos props. propias",
    RATES ? "≈ $"+Math.round(propIngTotal).toLocaleString("es-AR") : fmtM(propIngARS),
    ingPropLines.length ? ingPropLines : null, "#2D7A4F");
  out += kpi("Comisiones gestión mes",
    RATES ? "≈ $"+Math.round(comTotal).toLocaleString("es-AR") : fmtM(comARS),
    comLines.length ? comLines : null, "#6040A0");
  out += kpi("Egresos totales mes",
    RATES ? "≈ $"+Math.round(egTotal).toLocaleString("es-AR") : fmtM(egARS),
    egLines.length ? egLines : null, "#B84040");
  out += kpi("Neto total mes (ingresos − egresos)",
    RATES ? "≈ $"+Math.round(neto).toLocaleString("es-AR") : "—",
    RATES ? ["Propias + comisiones vs egresos"] : ["Cargá cotizaciones para ver el combinado"],
    neto >= 0 ? "#2D7A4F" : "#B84040");
  out += kpi("Props. propias",   propias.length,  [DATA.contratos.filter(function(c){return c.vigente&&propias.some(function(p){return p.id===c.propiedadId;});}).length+" alquiladas"]);
  out += kpi("Props. gestionadas", gestidas.length, [DATA.clientes.length+" clientes", gestidas.length+" propiedades"]);
  out += '</div>';

  if (noRates) {
    out += '<div style="background:#FDF3E0;border:1px solid rgba(160,96,16,.2);border-radius:8px;padding:10px 16px;font-size:12px;color:#A06010;margin-bottom:16px;">⚠ Hay movimientos en USD o BRL. <button onclick="refreshRates()" style="background:none;border:none;cursor:pointer;color:#B8922A;font-weight:500;text-decoration:underline;font-size:12px;">Cargar cotizaciones</button> para ver los totales combinados en ARS.</div>';
  }

  // Summary table per property
  var porProp = DATA.propiedades.map(function(p) {
    var tx  = DATA.transacciones.filter(function(t){return t.propiedadId===p.id && t.fecha&&t.fecha.startsWith(mes);});
    var ing = sum(tx,"ingreso"), eg = sum(tx,"egreso");
    var com = sum(tx.filter(function(t){return t.esComision;}),"ingreso");
    var cont= DATA.contratos.find(function(c){return c.propiedadId===p.id&&c.vigente;});
    var inq = cont ? DATA.inquilinos.find(function(i){return i.id===cont.inquilinoId;}) : null;
    var cli = DATA.clientes.find(function(c){return c.id===p.clienteId;});
    // figure out currency label from most recent tx
    var monedas = [...new Set(tx.map(function(t){return t.moneda||"ARS";}))];
    return {p:p, ing:ing, eg:eg, n:ing-eg, com:com, inq:inq, cli:cli, monedas:monedas, tx:tx};
  });

  if (porProp.length) {
    var xH = ["Propiedad","Ciudad","Titularidad","Cliente/Dueño","Inquilino","Ingresos","Egresos","Neto/Comisión"];
    var xR = porProp.map(function(x){
      // use currency of first tx if available
      var cur = x.tx.length ? (x.tx[0].moneda||"ARS") : "ARS";
      return [x.p.nombre, x.p.ciudad, x.p.ownership==="propia"?"Propia":"Gestionada", x.cli&&x.cli.nombre||"—", x.inq&&x.inq.nombre||"—", fmtM(x.ing,cur), fmtM(x.eg,cur), x.p.ownership==="gestionada"?fmtM(x.com,cur):fmtM(x.n,cur)];
    });
    var tbody = "";
    porProp.forEach(function(x) {
      var netColor = x.p.ownership==="gestionada" ? "#6040A0" : (x.n>=0?"#2D7A4F":"#B84040");
      var cur = x.tx.length ? (x.tx[0].moneda||"ARS") : "ARS";
      tbody += '<tr class="hr">';
      tbody += '<td style="' + tdSt() + 'font-weight:500;">' + esc(x.p.nombre) + '</td>';
      tbody += '<td style="' + tdSt() + 'color:#9A8E7A;">' + esc(x.p.ciudad) + '</td>';
      tbody += '<td style="' + tdSt() + '">' + badge(x.p.ownership==="propia"?"🏠 Propia":"🏢 Gestionada", x.p.ownership==="propia"?"gold":"purple") + '</td>';
      tbody += '<td style="' + tdSt() + 'color:#5A5040;">' + esc(x.cli&&x.cli.nombre||"—") + '</td>';
      tbody += '<td style="' + tdSt() + 'color:#5A5040;">' + esc(x.inq&&x.inq.nombre||"—") + '</td>';
      tbody += '<td style="' + tdSt() + 'color:#2D7A4F;font-weight:500;">' + (x.ing?fmtM(x.ing,cur):"—") + '</td>';
      tbody += '<td style="' + tdSt() + 'color:#B84040;font-weight:500;">' + (x.eg?fmtM(x.eg,cur):"—") + '</td>';
      tbody += '<td style="' + tdSt() + 'font-weight:600;color:' + netColor + ';">' + (x.p.ownership==="gestionada"?fmtM(x.com,cur):fmtM(x.n,cur)) + '</td>';
      tbody += '</tr>';
    });
    var thead = "<thead><tr style='background:#F2EDE4;'>";
    xH.forEach(function(h){thead += '<th style="'+thSt()+'">'+esc(h)+'</th>';});
    thead += "</tr></thead>";
    out += card(
      '<div style="padding:12px 20px;border-bottom:1px solid #E2D9CC;display:flex;align-items:center;justify-content:space-between;">'
      + '<span style="font-family:\'Cormorant Garamond\',serif;font-size:15px;font-weight:600;">Resumen por propiedad — mes actual</span>'
      + exportBar("Resumen por propiedad", xH, xR, "resumen_propiedades")
      + '</div><div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;">'
      + thead + '<tbody>' + tbody + '</tbody></table></div>'
    );
  }
  return out;
}

function buildRateBox(name, rate, color) {
  if (!rate) return "";
  return '<div style="background:#F2EDE4;border-radius:8px;padding:10px 14px;">'
    + '<div style="font-size:12px;color:' + color + ';font-weight:500;margin-bottom:5px;">' + esc(name) + '</div>'
    + '<div style="display:flex;gap:10px;font-size:12px;color:#9A8E7A;">Compra <strong style="color:#1C1810">$' + Math.round(rate.compra||0).toLocaleString("es-AR") + '</strong> Venta <strong style="color:#1C1810">$' + Math.round(rate.venta||0).toLocaleString("es-AR") + '</strong></div>'
    + '</div>';
}

// ─── PROPIEDADES ──────────────────────────────────────────────────────────────
function tabPropiedades() {
  var f    = _propFiltro;
  var list = DATA.propiedades.filter(function(p){return f==="todas"||p.ownership===f;});
  var pills = "";
  [["todas","Todas"],["propia","Propias"],["gestionada","Gestionadas"]].forEach(function(pair) {
    var active = f===pair[0];
    pills += '<button onclick="_propFiltro=\'' + pair[0] + '\';setTab(\'propiedades\')" style="background:' + (active?"#fff":"transparent") + ';border:none;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;color:' + (active?"#B8922A":"#9A8E7A") + ';font-weight:' + (active?500:400) + ';">' + pair[1] + '</button>';
  });

  var pCount  = DATA.propiedades.filter(function(p){return p.ownership==="propia";}).length;
  var gCount  = DATA.propiedades.filter(function(p){return p.ownership==="gestionada";}).length;

  var out = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;">';
  out += '<div><h2 style="font-family:\'Cormorant Garamond\',serif;font-size:24px;font-weight:600;">Propiedades</h2>';
  out += '<p style="color:#9A8E7A;font-size:12px;margin-top:2px;">🏠 '+pCount+' propias &nbsp;·&nbsp; 🏢 '+gCount+' gestionadas</p></div>';
  out += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">';
  out += '<div style="background:#F2EDE4;border-radius:8px;padding:3px;display:flex;gap:2px;">' + pills + '</div>';
  out += btnPrimary("+ Agregar", "openPropForm(null)");
  out += '</div></div>';
  out += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;">';

  list.forEach(function(p) {
    var cont = DATA.contratos.find(function(c){return c.propiedadId===p.id&&c.vigente;});
    var inq  = cont ? DATA.inquilinos.find(function(i){return i.id===cont.inquilinoId;}) : null;
    var cli  = DATA.clientes.find(function(c){return c.id===p.clienteId;});
    var adm  = DATA.administradores.find(function(a){return a.id===p.adminId;});
    var isP  = p.ownership==="propia";
    var bgGrad = isP ? "linear-gradient(135deg,#FBF6EC,#F2EDE4)" : "linear-gradient(135deg,#F0EAFA,#F2EDE4)";

    var body = '<div style="background:' + bgGrad + ';padding:14px 16px 12px;border-bottom:1px solid #E2D9CC;">';
    body += '<div style="display:flex;justify-content:space-between;align-items:flex-start;">';
    body += '<div><div style="font-family:\'Cormorant Garamond\',serif;font-size:16px;font-weight:600;margin-bottom:5px;">' + esc(p.nombre) + '</div>';
    body += '<div style="display:flex;gap:5px;flex-wrap:wrap;">' + badge(isP?"🏠 Propia":"🏢 Gestionada",isP?"gold":"purple") + ' ' + badge(p.tipo,"blue");
    if (!isP && p.modoGestion) body += ' ' + badge(p.modoGestion==="cobrador"?"Cobrador":"Comisionista","gray");
    body += '</div></div>';
    body += '<div style="display:flex;gap:5px;">';
    body += '<button onclick="openPropForm(\'' + p.id + '\')" style="background:rgba(255,255,255,.7);border:1px solid #E2D9CC;border-radius:6px;padding:5px;cursor:pointer;display:flex;">' + icon('<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',12,"#5A5040") + '</button>';
    body += '<button onclick="delProp(\'' + p.id + '\')" style="background:#FAEAEA;border:none;border-radius:6px;padding:5px;cursor:pointer;display:flex;">' + icon('<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>',12,"#B84040") + '</button>';
    body += '</div></div></div>';
    body += '<div style="padding:12px 16px;font-size:12px;color:#5A5040;display:flex;flex-direction:column;gap:4px;">';
    if (p.ciudad) body += '<span>📍 ' + esc(p.ciudad) + (p.barrio?" · "+esc(p.barrio):"") + '</span>';
    if (p.direccion) body += '<span style="color:#9A8E7A;font-size:11px;">' + esc(p.direccion) + '</span>';
    if (p.superficie) body += '<span>📐 ' + esc(p.superficie) + ' m²</span>';
    if (!isP && cli) body += '<span style="color:#6040A0;">Dueño: <strong>' + esc(cli.nombre) + '</strong></span>';
    if (!isP && p.comisionPct) body += '<span style="color:#6040A0;">Comisión: <strong>' + esc(p.comisionPct) + '%</strong></span>';
    if (adm) body += '<span style="color:#9A8E7A;">Gestor ext: ' + esc(adm.nombre) + '</span>';
    if (cont) {
      body += '<div style="background:#EBF7F0;border-radius:6px;padding:5px 9px;color:#2D7A4F;font-size:11px;margin-top:4px;">✓ ' + esc(inq&&inq.nombre||"?") + ' · vence ' + fmtD(cont.fechaFin) + '</div>';
    } else {
      body += '<div style="background:#F2EDE4;border-radius:6px;padding:5px 9px;color:#9A8E7A;font-size:11px;margin-top:4px;">Sin contrato activo</div>';
    }
    body += '</div>';
    out += card(body);
  });

  if (!list.length) out += '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#9A8E7A;">Sin propiedades en esta categoría</div>';
  out += '</div>';
  return out;
}

window.openPropForm = function(id) {

    + fld("Tipo", '<select id="pf-tipo" style="'+IST+'">'+tiposOpts+'</select>')
    + fld("Titularidad",
        '<select id="pf-own" style="'+IST+'" onchange="renderGestFields()">'

function buildTxTable(sorted) {
  if (!sorted.length) return '<div style="text-align:center;padding:50px;color:#9A8E7A;">Sin movimientos</div>';
  var thead = "<thead><tr style='background:#F2EDE4;'>";
  ["Fecha","Propiedad","Categoría","Descripción","Tipo","Monto",""].forEach(function(h){thead+='<th style="'+thSt()+'">'+h+'</th>';});
  thead += "</tr></thead>";
  var tbody = "";
  sorted.forEach(function(t) {
    var p   = DATA.propiedades.find(function(x){return x.id===t.propiedadId;});
    var isG = p && p.ownership==="gestionada";
    var rowBg = t.esComision ? "rgba(96,64,160,.04)" : "transparent";
    tbody += '<tr class="hr" style="background:'+rowBg+'">';
    tbody += '<td style="'+tdSt()+'color:#9A8E7A;white-space:nowrap;font-size:12px;">'+fmtD(t.fecha)+'</td>';
    tbody += '<td style="'+tdSt()+'font-size:12px;"><div style="font-weight:500;">'+esc(p&&p.nombre||"—")+'</div>'+(p?badge(isG?"🏢":"🏠",isG?"purple":"gold"):"")+'</td>';
    tbody += '<td style="'+tdSt()+'color:#9A8E7A;font-size:12px;">'+esc(t.categoria)+'</td>';
    tbody += '<td style="'+tdSt()+'font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(t.descripcion||"—")+(t.esComision?'<span style="margin-left:5px;font-size:10px;color:#6040A0;background:#F0EAFA;padding:1px 5px;border-radius:4px;">Comisión</span>':"")+'</td>';
    tbody += '<td style="'+tdSt()+'">'+badge(t.tipo==="ingreso"?"↑ Ingreso":"↓ Egreso",t.tipo==="ingreso"?"green":"red")+'</td>';
    tbody += '<td style="'+tdSt()+'font-size:13px;font-weight:600;color:'+(t.tipo==="ingreso"?"#2D7A4F":"#B84040")+';white-space:nowrap;text-align:right;">'+fmtM(t.monto,t.moneda||"ARS")+'</td>';
    tbody += '<td style="'+tdSt()+'"><div style="display:flex;gap:4px;">';
    tbody += '<button onclick="openTxForm(\''+t.id+'\')" style="background:none;border:none;color:#9A8E7A;cursor:pointer;padding:3px;display:flex;">'+icon('<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',11)+'</button>';
    tbody += '<button onclick="delTx(\''+t.id+'\')" style="background:none;border:none;color:#B84040;cursor:pointer;padding:3px;display:flex;">'+icon('<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>',11)+'</button>';
    tbody += '</div></td></tr>';
  });
  return '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;">'+thead+'<tbody>'+tbody+'</tbody></table></div>';
}

window.updateConv = function() {
  var amt  = parseFloat(document.getElementById("cv-amt")&&document.getElementById("cv-amt").value)||0;
  var from = document.getElementById("cv-from")&&document.getElementById("cv-from").value;
  var to   = document.getElementById("cv-to")&&document.getElementById("cv-to").value;
  if (!RATES) return;
  function getR(c){return c==="ARS"?1:c==="USD"?(RATES.blue&&RATES.blue.venta||null):c==="BRL"?(RATES.brl&&RATES.brl.venta||null):null;}
  var rF=getR(from), rT=getR(to);
  var res = rF&&rT ? (from==="ARS"?amt:amt*rF)/(to==="ARS"?1:rT)*(to==="ARS"?1:1) : null;
  // simpler: convert to ARS first, then to target
  if (rF && rT) { var ars = from==="ARS"?amt:amt*rF; res = to==="ARS"?ars:ars/rT; }
  var el = document.getElementById("cv-res");
  if (el) el.innerHTML = '<span style="font-family:\'Cormorant Garamond\',serif;font-size:22px;font-weight:600;color:#B8922A;">'+(res!==null?fmtM(res,to):"—")+'</span>';
};

    body += '<button onclick="delAdm(\''+a.id+'\')" style="background:#FAEAEA;border:none;border-radius:6px;padding:5px;cursor:pointer;display:flex;">'+icon('<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>',12,"#B84040")+'</button>';
    body += '</div></div>';
    body += '<div style="font-size:12px;color:#5A5040;display:flex;flex-direction:column;gap:4px;">';
    if (a.telefono) body += '<a href="tel:'+esc(a.telefono)+'" style="color:#2D5A8E;text-decoration:none;">'+esc(a.telefono)+'</a>';
    if (a.email)    body += '<a href="mailto:'+esc(a.email)+'" style="color:#2D5A8E;text-decoration:none;">'+esc(a.email)+'</a>';
    if (a.comision) body += '<span style="color:#B8922A;font-weight:500;">Comisión: '+esc(a.comision)+'%</span>';
    if (a.cuit)     body += '<span>CUIT: '+esc(a.cuit)+'</span>';
    if (props.length) body += '<div style="margin-top:4px;padding-top:4px;border-top:1px solid #E2D9CC;font-size:11px;color:#9A8E7A;">'+props.map(function(p){return esc(p.nombre);}).join(" · ")+'</div>';
    body += '</div></div>';
    out += card(body);
  });
  if (!DATA.administradores.length) out += '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#9A8E7A;">Sin gestores externos</div>';
  out += '</div>';
  return out;
}
window.openAdmForm = function(id) {
  var TIPOS = ["Inmobiliaria","Property Manager","Gestor particular","Otro"];
  var a = id ? DATA.administradores.find(function(x){return x.id===id;})
             : {id:uid(),nombre:"",tipo:"Inmobiliaria",telefono:"",email:"",comision:"",cuit:"",notas:""};
  var tiposOpts = TIPOS.map(function(t){return '<option'+(a.tipo===t?" selected":"")+'>'+esc(t)+'</option>';}).join("");
  var body = g2(
    fld("Nombre",     '<input id="af-n"  style="'+IST+'" value="'+esc(a.nombre)+'"\/>')
    + fld("Tipo",     '<select id="af-ti" style="'+IST+'">'+tiposOpts+'</select>')
    + fld("Teléfono", '<input id="af-t"  style="'+IST+'" value="'+esc(a.telefono)+'"\/>')
    + fld("Email",    '<input id="af-e"  type="email" style="'+IST+'" value="'+esc(a.email)+'"\/>')
    + fld("Comisión (%)","<input id='af-c' type='number' style='"+IST+"' value='"+esc(a.comision)+"'/>")
    + fld("CUIT",     '<input id="af-cu" style="'+IST+'" value="'+esc(a.cuit)+'"\/>')
    + fld("Notas", '<textarea id="af-no" style="'+IST+'resize:vertical;min-height:50px;">'+esc(a.notas)+'</textarea>', true)
  );
  showModal(id?"Editar gestor":"Nuevo gestor", body + formActions("saveAdm('"+a.id+"')"), true);
};
window.saveAdm = async function(id) {
  var n = document.getElementById("af-n").value.trim(); if(!n){alert("Nombre obligatorio.");return;}
  var f = {id:id, nombre:n, tipo:document.getElementById("af-ti").value, telefono:document.getElementById("af-t").value, email:document.getElementById("af-e").value, comision:document.getElementById("af-c").value, cuit:document.getElementById("af-cu").value, notas:document.getElementById("af-no").value};
  var list = DATA.administradores.some(function(x){return x.id===id;}) ? DATA.administradores.map(function(x){return x.id===id?f:x;}) : DATA.administradores.concat([f]);
  await save(Object.assign({},DATA,{administradores:list})); closeModal();
};
window.delAdm = async function(id) { if(!confirm("¿Eliminar?"))return; await save(Object.assign({},DATA,{administradores:DATA.administradores.filter(function(a){return a.id!==id;})})); };

// ─── CONFIG ───────────────────────────────────────────────────────────────────
function tabConfig() {
  function editorHtml(title, items, tipo, color) {
    var pills = "";
    items.forEach(function(it) {
      pills += '<div style="display:flex;align-items:center;background:#F2EDE4;border:1px solid #E2D9CC;border-radius:20px;overflow:hidden;">';
      pills += '<span style="padding:4px 10px 4px 12px;font-size:12px;color:#5A5040;">'+esc(it)+'</span>';
      pills += '<button onclick="delCat(\''+tipo+'\',\''+esc(it).replace(/'/g,"\\'")+'\')" style="background:none;border:none;cursor:pointer;color:#B84040;padding:4px 8px;font-size:14px;line-height:1;">×</button>';
      pills += '</div>';
    });
    return card(
      '<div style="padding:18px 20px;">'
      + '<h3 style="font-family:\'Cormorant Garamond\',serif;font-size:17px;font-weight:600;margin-bottom:14px;color:'+color+';">'+esc(title)+' <span style="font-size:12px;color:#9A8E7A;font-family:\'DM Sans\',sans-serif;font-weight:400;">('+items.length+')</span></h3>'
      + '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;">'+pills+'</div>'
      + '<div style="display:flex;gap:8px;"><input id="cfg-new-'+tipo+'" style="'+IST+'flex:1;" placeholder="Nuevo tipo..." onkeydown="if(event.key===\'Enter\')addCat(\''+tipo+'\')"/>'
      + '<button onclick="addCat(\''+tipo+'\')" style="background:linear-gradient(135deg,#C8A96E,#B8922A);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;">+ Agregar</button></div>'
      + '</div>'
    );
  }

  var out = '<h2 style="font-family:\'Cormorant Garamond\',serif;font-size:24px;font-weight:600;margin-bottom:20px;">Configuración</h2>';
  out += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;margin-bottom:16px;">';
  out += editorHtml("Tipos de egreso",  DATA.tiposGasto,   "gasto",   "#B84040");
  out += editorHtml("Tipos de ingreso", DATA.tiposIngreso, "ingreso", "#2D7A4F");
  out += '</div>';
  out += card('<div style="padding:20px 22px;background:#FBF6EC;border-radius:12px;">'
    + '<h3 style="font-family:\'Cormorant Garamond\',serif;font-size:16px;margin-bottom:10px;">🔑 Estado de Firebase</h3>'
    + '<p style="font-size:12px;color:#5A5040;line-height:1.8;"><strong style="color:#2D7A4F;">✓ Firebase conectado</strong> — datos sincronizados en la nube.'+(USER?' Usuario: '+esc(USER.email):'')+'</p>'
    + '</div>');
  return out;
}
window.addCat = async function(tipo) {
  var el = document.getElementById("cfg-new-"+tipo);
  var v  = el&&el.value.trim(); if(!v) return;
  var key = tipo==="gasto"?"tiposGasto":"tiposIngreso";
  if (DATA[key].includes(v)){alert("Ya existe.");return;}
  el.value = "";
  await save(Object.assign({},DATA,{[key]:DATA[key].concat([v])}));
};
window.delCat = async function(tipo, val) {
  if(!confirm("¿Eliminar \""+val+"\"?"))return;
  var key = tipo==="gasto"?"tiposGasto":"tiposIngreso";
  await save(Object.assign({},DATA,{[key]:DATA[key].filter(function(x){return x!==val;})}));
};

</script>
