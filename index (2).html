<!-- ════════════════════════════════════════════
     ▸ PASO 1 — PEGÁ TUS CREDENCIALES DE FIREBASE
     ════════════════════════════════════════════
     1. Ir a console.firebase.google.com
     2. Crear proyecto → "rtc-property" (o el nombre que quieras)
     3. Ir a Configuración del proyecto (⚙) → Tus apps → Web (</>)
     4. Registrar app → copiar el bloque firebaseConfig
     5. Reemplazar los valores de abajo

<script type="module">
import { initializeApp }              from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, doc, getDoc,
         setDoc, onSnapshot }         from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { getAuth, signInWithPopup,
         signOut, onAuthStateChanged,
         GoogleAuthProvider }         from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";


const firebaseConfig = {
  apiKey:            "AIzaSyB7zKfQZ713jgYcTjtXR9EYlcx3bsECErE",
  authDomain:        "rtc-property.firebaseapp.com",
  projectId:         "rtc-property",
  storageBucket:     "rtc-property.firebasestorage.app",
  messagingSenderId: "80464197538",
  appId:             "1:80464197538:web:c65cc3da657625ce39e4fb"
};


const app      = initializeApp(firebaseConfig);
const db       = getFirestore(app);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();

// ─── DEMO MODE (si las credenciales no están configuradas) ───────────────────
const DEMO = firebaseConfig.apiKey === "TU_API_KEY";
if(DEMO) console.warn("⚠ Modo demo: usando localStorage. Configurá Firebase para sincronización real.");

// ─── PERSISTENCIA ─────────────────────────────────────────────────────────────
let unsubscribe = null;
let currentUid  = null;

async function loadData(){
  if(DEMO) return JSON.parse(localStorage.getItem("rtcpm_v3")||"null");
  if(!currentUid) return null;
  const snap = await getDoc(doc(db,"usuarios",currentUid,"datos","main"));
  return snap.exists() ? snap.data() : null;
}
async function saveData(d){
  if(DEMO){ localStorage.setItem("rtcpm_v3",JSON.stringify(d)); return; }
  if(!currentUid) return;
  await setDoc(doc(db,"usuarios",currentUid,"datos","main"), d);
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
async function loginGoogle(){
  if(DEMO){ initApp(null); return; }
  try{ await signInWithPopup(auth, provider); }
  catch(e){ alert("Error al iniciar sesión: "+e.message); }
}
async function logout(){
  if(DEMO){ renderLogin(); return; }
  await signOut(auth);
}

onAuthStateChanged(auth, user => {
  currentUid = user ? user.uid : null;
  if(user || DEMO) initApp(user);
  else renderLogin();
});

if(DEMO) initApp(null); // arrancar directo en modo demo

// ═══════════════════════════════════════════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════════════════════════════════════════
const DEFAULTS = {
  propiedades:[], inquilinos:[], clientes:[], contratos:[],
  transacciones:[], administradores:[],
  tiposGasto:["Agua","Luz","Gas","Expensas","ABL","Inmobiliario",
    "Internet/Teléfono","Mantenimiento","Reparación","Seguro",
    "Honorarios legales","Comisión administrador","Otro gasto"],
  tiposIngreso:["Alquiler","Depósito","Multa por mora","Ajuste de contrato","Otro ingreso"],
};

let DATA  = null;
let TAB   = "dashboard";
let RATES = null;
let USER  = null;

async function initApp(user){
  USER = user;
  DATA = (await loadData()) || JSON.parse(JSON.stringify(DEFAULTS));
  fetchRates();
  render();
}

async function save(newData){
  DATA = newData;
  await saveData(DATA);
  render();
}

// ═══════════════════════════════════════════════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════════════════════════════════════════════
const uid    = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today  = () => new Date().toISOString().slice(0,10);
const fmtD   = d => d ? new Date(d+"T12:00:00").toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"}) : "—";
const fmtM   = (n,cur="ARS") => {
  if(n==null||n==="")return"—";
  const sym={ARS:"$",USD:"USD",BRL:"R$"}[cur]||cur;
  return`${sym} ${Number(n).toLocaleString("es-AR",{minimumFractionDigits:0,maximumFractionDigits:0})}`;
};
const diasH  = d => d ? Math.ceil((new Date(d+"T12:00:00")-new Date())/86400000) : null;
const mesStr = () => new Date().toISOString().slice(0,7);
const esc    = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const sum    = (arr,tipo) => arr.filter(t=>t.tipo===tipo).reduce((s,t)=>s+(t.monto||0),0);

async function fetchRates(){
  try{
    const [a,b,c] = await Promise.allSettled([
      fetch("https://dolarapi.com/v1/dolares/blue").then(r=>r.json()),
      fetch("https://dolarapi.com/v1/dolares/oficial").then(r=>r.json()),
      fetch("https://dolarapi.com/v1/cotizaciones/brl").then(r=>r.json()),
    ]);
    RATES = {
      blue:   a.status==="fulfilled"?a.value:null,
      oficial:b.status==="fulfilled"?b.value:null,
      brl:    c.status==="fulfilled"?c.value:null,
    };
    render();
  }catch(e){}
}

// ═══════════════════════════════════════════════════════════════════════════════
// EXPORTS
// ═══════════════════════════════════════════════════════════════════════════════
window.exportXLSX = async function(rows, headers, filename){
  const XLSX = await import("https://cdn.sheetjs.com/xlsx-0.20.0/package/xlsx.mjs");
  const ws = XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws["!cols"] = headers.map(h=>({wch:Math.max(String(h).length,14)}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Datos");
  XLSX.writeFile(wb,filename+".xlsx");
};

window.exportPDF = function(title,headers,rows){
  const e = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${e(title)}</title>
<style>body{font-family:Arial,sans-serif;font-size:11px;color:#1C1810;padding:24px;}
h1{font-size:18px;color:#B8922A;margin-bottom:4px;}.sub{font-size:11px;color:#9A8E7A;margin-bottom:16px;}
table{width:100%;border-collapse:collapse;}
th{background:#FBF6EC;color:#B8922A;font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:7px 10px;text-align:left;border-bottom:2px solid #C8A96E;}
td{padding:6px 10px;border-bottom:1px solid #E2D9CC;font-size:11px;}
tr:nth-child(even) td{background:#F7F4EE;}
@media print{@page{margin:15mm;}}</style></head><body>
<h1>${e(title)}</h1><div class="sub">Generado el ${new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"long",year:"numeric"})}</div>
<table><thead><tr>${headers.map(h=>`<th>${e(h)}</th>`).join("")}</tr></thead>
<tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${e(c)}</td>`).join("")}</tr>`).join("")}</tbody></table>
</body></html>`;
  const w=window.open("","_blank");
  if(!w){alert("Habilitá los popups para exportar PDF");return;}
  w.document.write(html);w.document.close();w.focus();
  setTimeout(()=>w.print(),400);
};

      <div style="max-width:1280px;margin:0 auto;padding:0 16px;display:flex;">

function svgIcon(paths,size=16,color="currentColor"){
  return`<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">${paths}</svg>`;
}

window.setTab    = t => { TAB=t; render(); };
window.loginGoogle = loginGoogle;
window.logoutBtn   = () => logout().then(()=>renderLogin());
window.fetchRatesBtn = () => fetchRates();

function badge(text,color="gold"){

    <button onclick='exportPDF("${esc(title)}",${h},${r})' style="${ghostBtn()}">⬇ PDF</button>

}
function ghostBtn(small=true){
  return`background:transparent;color:#5A5040;border:1px solid #E2D9CC;border-radius:8px;padding:${small?"6px 12px":"9px 18px"};font-size:${small?12:13}px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;`;
}
function primaryBtn(label,onclick,icon=""){
  return`<button onclick="${onclick}" style="background:linear-gradient(135deg,#C8A96E,#B8922A);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;display:inline-flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(184,146,42,.25);">${icon}${esc(label)}</button>`;
}
function secHdr(title,sub,actionHtml=""){

    <div>

function thStyle(){return`padding:9px 14px;text-align:left;font-size:10px;color:#9A8E7A;font-weight:500;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;`;}
function tdStyle(){return`padding:10px 14px;font-size:13px;border-top:1px solid #E2D9CC;`;}

// MODAL SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════
function showModal(title, bodyHtml, wide=false){
  let m = document.getElementById("modal-overlay");
  if(!m){ m=document.createElement("div"); m.id="modal-overlay"; document.body.appendChild(m); }
  m.style.cssText="position:fixed;inset:0;background:rgba(28,24,16,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;";
  m.innerHTML=`
    <div style="background:#fff;border:1px solid #E2D9CC;border-radius:16px;width:100%;max-width:${wide?700:540}px;max-height:92vh;overflow:auto;box-shadow:0 8px 32px rgba(0,0,0,.12);animation:fi .2s ease both;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 24px 14px;border-bottom:1px solid #E2D9CC;position:sticky;top:0;background:#fff;z-index:1;">
        <h3 style="font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;">${esc(title)}</h3>
        <button onclick="closeModal()" style="background:none;border:none;color:#9A8E7A;cursor:pointer;display:flex;padding:4px;">${svgIcon(`<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`,18)}</button>
      </div>
      <div style="padding:20px 24px 24px;">${bodyHtml}</div>
    </div>`;
  m.onclick = e => { if(e.target===m) closeModal(); };
}
window.closeModal = () => { const m=document.getElementById("modal-overlay"); if(m) m.remove(); };

function iSt(extra=""){return`width:100%;background:#fff;border:1px solid #E2D9CC;border-radius:8px;padding:9px 12px;color:#1C1810;font-size:13px;outline:none;font-family:'DM Sans',sans-serif;${extra}`;}
function lSt(){return`display:block;color:#9A8E7A;font-size:11px;font-weight:500;margin-bottom:4px;letter-spacing:.4px;text-transform:uppercase;`;}
function fldHtml(label,inputHtml,span2=false){
  return`<div style="grid-column:${span2?"span 2":"span 1"}">

}
function g2(content){return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">${content}</div>`;}
function formActions(saveCall){

function renderTab(){
  switch(TAB){
    case "dashboard":   return tabDashboard();
    case "propiedades": return tabPropiedades();
    case "inquilinos":  return tabInquilinos();
    case "clientes":    return tabClientes();
    case "contratos":   return tabContratos();
    case "movimientos": return tabMovimientos();
    case "gestores":    return tabGestores();
    case "config":      return tabConfig();
    default: return "";
  }
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function tabDashboard(){
  const mes=mesStr();
  const txM=DATA.transacciones.filter(t=>t.fecha?.startsWith(mes));
  const propias=DATA.propiedades.filter(p=>p.ownership==="propia");
  const gestionadas=DATA.propiedades.filter(p=>p.ownership==="gestionada");
  const totI=sum(txM,"ingreso"), totE=sum(txM,"egreso");
  const propTx=txM.filter(t=>propias.some(p=>p.id===t.propiedadId));
  const propI=sum(propTx,"ingreso"), propE=sum(propTx,"egreso");
  const comis=sum(txM.filter(t=>t.esComision),"ingreso");
  const fR=n=>n?`$${Math.round(n).toLocaleString("es-AR")}`:"—";

  const kpi=(label,val,sub,color="#B8922A")=>`
    <div style="background:#fff;border:1px solid #E2D9CC;border-radius:12px;padding:18px 20px;">
      <div style="color:#9A8E7A;font-size:10px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;">${esc(label)}</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:${color};line-height:1;">${esc(String(val))}</div>
      ${sub?`<div style="color:#9A8E7A;font-size:11px;margin-top:5px;">${esc(sub)}</div>`:""}
    </div>`;

  const ratesPanel = RATES ? `
    ${card(`<div style="padding:16px 20px;">
      <div style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;margin-bottom:12px;">Cotizaciones del día</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;">
        ${[{n:"💵 USD Blue",b:RATES.blue?.compra,v:RATES.blue?.venta,c:"#B8922A"},
           {n:"🏦 USD Oficial",b:RATES.oficial?.compra,v:RATES.oficial?.venta,c:"#5A5040"},
           {n:"🇧🇷 Real BRL",b:RATES.brl?.compra,v:RATES.brl?.venta,c:"#2D5A8E"}]
          .map(r=>`<div style="background:#F2EDE4;border-radius:8px;padding:10px 14px;">
            <div style="font-size:12px;color:${r.c};font-weight:500;margin-bottom:5px;">${r.n}</div>
            <div style="display:flex;gap:10px;font-size:12px;color:#9A8E7A;">
              Compra <strong style="color:#1C1810">${fR(r.b)}</strong>
              Venta <strong style="color:#1C1810">${fR(r.v)}</strong>
            </div>
          </div>`).join("")}
      </div>
    </div>`,"margin-bottom:20px;")}` : "";

  const porProp = DATA.propiedades.map(p=>{
    const tx=DATA.transacciones.filter(t=>t.propiedadId===p.id&&t.fecha?.startsWith(mes));
    const ing=sum(tx,"ingreso"), eg=sum(tx,"egreso");
    const com=sum(tx.filter(t=>t.esComision),"ingreso");
    const cont=DATA.contratos.find(c=>c.propiedadId===p.id&&c.vigente);
    const inq=cont?DATA.inquilinos.find(i=>i.id===cont.inquilinoId):null;
    const cli=DATA.clientes.find(c=>c.id===p.clienteId);
    return{...p,ing,eg,n:ing-eg,com,inq,cli};
  });

  const xR=porProp.map(p=>[p.nombre,p.ciudad,p.ownership==="propia"?"Propia":"Gestionada",p.cli?.nombre||"—",p.inq?.nombre||"—",fmtM(p.ing),fmtM(p.eg),p.ownership==="gestionada"?fmtM(p.com):fmtM(p.n)]);
  const xH=["Propiedad","Ciudad","Titularidad","Cliente/Dueño","Inquilino","Ingresos","Egresos","Neto/Comisión"];

  return`
  ${secHdr(`Dashboard — ${new Date().toLocaleDateString("es-AR",{month:"long",year:"numeric"})}`)}
  ${ratesPanel}
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;margin-bottom:20px;">
    ${kpi("Ingresos totales mes",fmtM(totI),"","#2D7A4F")}
    ${kpi("Egresos totales mes",fmtM(totE),"","#B84040")}
    ${kpi("Neto props. propias",fmtM(propI-propE),`Ing ${fmtM(propI)} · Eg ${fmtM(propE)}`,propI-propE>=0?"#2D7A4F":"#B84040")}
    ${kpi("Comisiones gestión",fmtM(comis),"","#6040A0")}
    ${kpi("Props. propias",propias.length,`${DATA.contratos.filter(c=>c.vigente&&propias.some(p=>p.id===c.propiedadId)).length} alquiladas`)}
    ${kpi("Props. gestionadas",gestionadas.length,`${DATA.clientes.length} clientes`)}
  </div>
  ${porProp.length?card(`
    <div style="padding:12px 20px;border-bottom:1px solid #E2D9CC;display:flex;align-items:center;justify-content:space-between;">
      <span style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;">Resumen por propiedad — mes actual</span>
      ${exportBar("Resumen por propiedad",xH,xR,"resumen_propiedades")}
    </div>
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr style="background:#F2EDE4;">${xH.map(h=>`<th style="${thStyle()}">${esc(h)}</th>`).join("")}</tr></thead>
        <tbody>${porProp.map(p=>`
          <tr style="cursor:default;" onmouseover="this.style.background='#FBF6EC'" onmouseout="this.style.background='transparent'">
            <td style="${tdStyle()}font-weight:500;">${esc(p.nombre)}</td>
            <td style="${tdStyle()}color:#9A8E7A;">${esc(p.ciudad)}</td>
            <td style="${tdStyle()}">${badge(p.ownership==="propia"?"🏠 Propia":"🏢 Gestionada",p.ownership==="propia"?"gold":"purple")}</td>
            <td style="${tdStyle()}color:#5A5040;">${esc(p.cli?.nombre||"—")}</td>
            <td style="${tdStyle()}color:#5A5040;">${esc(p.inq?.nombre||"—")}</td>
            <td style="${tdStyle()}color:#2D7A4F;font-weight:500;">${p.ing?fmtM(p.ing):"—"}</td>
            <td style="${tdStyle()}color:#B84040;font-weight:500;">${p.eg?fmtM(p.eg):"—"}</td>
            <td style="${tdStyle()}font-weight:600;color:${p.ownership==="gestionada"?"#6040A0":p.n>=0?"#2D7A4F":"#B84040"};">${p.ownership==="gestionada"?fmtM(p.com):fmtM(p.n)}</td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>`):""}`;
}

      ${primaryBtn("Agregar","openPropForm(null)",`${svgIcon(`<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>`,13)} `)}
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;">
    ${list.map(p=>{
      const cont=DATA.contratos.find(c=>c.propiedadId===p.id&&c.vigente);
      const inq=cont?DATA.inquilinos.find(i=>i.id===cont.inquilinoId):null;
      const cli=DATA.clientes.find(c=>c.id===p.clienteId);

      const isP=p.ownership==="propia";

        <div style="background:${isP?"linear-gradient(135deg,#FBF6EC,#F2EDE4)":"linear-gradient(135deg,#F0EAFA,#F2EDE4)"};padding:14px 16px 12px;border-bottom:1px solid #E2D9CC;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
              <div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;margin-bottom:5px;">${esc(p.nombre)}</div>
              <div style="display:flex;gap:5px;flex-wrap:wrap;">${badge(isP?"🏠 Propia":"🏢 Gestionada",isP?"gold":"purple")} ${badge(p.tipo,"blue")} ${!isP&&p.modoGestion?badge(p.modoGestion==="cobrador"?"Cobrador":"Comisionista","gray"):""}</div>
            </div>
            <div style="display:flex;gap:5px;">
              <button onclick="openPropForm('${p.id}')" style="background:rgba(255,255,255,.7);border:1px solid #E2D9CC;border-radius:6px;padding:5px;cursor:pointer;display:flex;">${svgIcon(`<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>`,12,"#5A5040")}</button>
              <button onclick="delProp('${p.id}')" style="background:#FAEAEA;border:none;border-radius:6px;padding:5px;cursor:pointer;display:flex;">${svgIcon(`<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M8 6V4h8v2"/>`,12,"#B84040")}</button>
            </div>
          </div>
        </div>
        <div style="padding:12px 16px;font-size:12px;color:#5A5040;display:flex;flex-direction:column;gap:4px;">
          ${p.ciudad?`<span>📍 ${esc(p.ciudad)}${p.barrio?" · "+esc(p.barrio):""}</span>`:""}
          ${p.direccion?`<span style="color:#9A8E7A;font-size:11px;">${esc(p.direccion)}</span>`:""}

window.openPropForm = function(id){
  const p = id ? DATA.propiedades.find(x=>x.id===id) : {id:uid(),nombre:"",tipo:"Departamento",ciudad:"",barrio:"",direccion:"",superficie:"",ownership:"propia",clienteId:"",modoGestion:"cobrador",comisionPct:"",adminId:"",notas:""};

  <div id="pf">
  ${g2(`
    ${fldHtml("Nombre / Alias",`<input id="pf-nombre" style="${iSt()}" value="${esc(p.nombre)}" placeholder="Ej: Depto Palermo"/>`)}
    ${fldHtml("Tipo",`<select id="pf-tipo" style="${iSt()}">${tipos.map(t=>`<option${p.tipo===t?" selected":""}>${t}</option>`).join("")}</select>`)}
    ${fldHtml("Titularidad",`<select id="pf-own" style="${iSt()}" onchange="renderPropGest()">${["propia","gestionada"].map(v=>`<option value="${v}"${p.ownership===v?" selected":""}>${v==="propia"?"🏠 Propia — ingresos y egresos nuestros":"🏢 Gestionada — de un cliente"}</option>`).join("")}</select>`,true)}

    ${fldHtml("Barrio",`<input id="pf-barrio" style="${iSt()}" value="${esc(p.barrio)}"/>`)}
    ${fldHtml("Dirección",`<input id="pf-dir" style="${iSt()}" value="${esc(p.direccion)}"/>`,true)}
    ${fldHtml("Superficie (m²)",`<input id="pf-sup" type="number" style="${iSt()}" value="${esc(p.superficie)}"/>`)}
    ${fldHtml("Gestor externo",`<select id="pf-admin" style="${iSt()}"><option value="">Sin gestor externo</option>${DATA.administradores.map(a=>`<option value="${a.id}"${p.adminId===a.id?" selected":""}>${esc(a.nombre)}</option>`).join("")}</select>`)}

function propGestFields(p){
  return`
  ${fldHtml("Cliente / Dueño",`<select id="pf-cli" style="${iSt()}"><option value="">— Seleccionar —</option>${DATA.clientes.map(c=>`<option value="${c.id}"${p.clienteId===c.id?" selected":""}>${esc(c.nombre)}</option>`).join("")}</select>`)}
  ${fldHtml("Modo de gestión",`<select id="pf-modo" style="${iSt()}"><option value="cobrador"${p.modoGestion==="cobrador"?" selected":""}>Cobrador (cobramos todo, transferimos)</option><option value="comisionista"${p.modoGestion==="comisionista"?" selected":""}>Comisionista (dueño cobra, nos paga comisión)</option></select>`)}
  ${fldHtml("Nuestra comisión (%)",`<input id="pf-com" type="number" style="${iSt()}" value="${esc(p.comisionPct)}"/>`)}`;
}
window.renderPropGest = function(){
  const isG=document.getElementById("pf-own").value==="gestionada";
  document.getElementById("pf-gest").innerHTML=isG?propGestFields({clienteId:"",modoGestion:"cobrador",comisionPct:""}):"";
};
window.saveProp = async function(id){
  const n=document.getElementById("pf-nombre").value.trim();
  const c=document.getElementById("pf-ciudad").value.trim();
  if(!n||!c){alert("Nombre y ciudad son obligatorios.");return;}
  const isG=document.getElementById("pf-own").value==="gestionada";
  const f={id,
    nombre:n, tipo:document.getElementById("pf-tipo").value,
    ciudad:c, barrio:document.getElementById("pf-barrio").value,
    direccion:document.getElementById("pf-dir").value,
    superficie:document.getElementById("pf-sup").value,
    ownership:document.getElementById("pf-own").value,
    clienteId:isG?(document.getElementById("pf-cli")?.value||""):"",
    modoGestion:isG?(document.getElementById("pf-modo")?.value||"cobrador"):"cobrador",
    comisionPct:isG?(document.getElementById("pf-com")?.value||""):"",
    adminId:document.getElementById("pf-admin").value,
    notas:document.getElementById("pf-notas").value,
  };
  await save({...DATA,propiedades:DATA.propiedades.some(x=>x.id===id)?DATA.propiedades.map(x=>x.id===id?f:x):[...DATA.propiedades,f]});
  closeModal();
};
window.delProp = async function(id){
  if(!confirm("¿Eliminar propiedad?"))return;
  await save({...DATA,propiedades:DATA.propiedades.filter(p=>p.id!==id)});
};

    .filter(t=>!f.q||`${t.descripcion} ${t.categoria}`.toLowerCase().includes(f.q.toLowerCase()));
  const txV=v==="propia"?txBase.filter(t=>{const p=DATA.propiedades.find(x=>x.id===t.propiedadId);return !p||p.ownership==="propia"||t.esComision;}):txBase;
  const sorted=[...txV].sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
  const ing=sum(sorted,"ingreso"), eg=sum(sorted,"egreso");
  const xH=["Fecha","Propiedad","Titularidad","Categoría","Descripción","Tipo","Moneda","Monto","Comisión"];
  const xR=sorted.map(t=>{const p=DATA.propiedades.find(x=>x.id===t.propiedadId);return[fmtD(t.fecha),p?.nombre||"—",p?.ownership==="propia"?"Propia":"Gestionada",t.categoria||"",t.descripcion||"",t.tipo==="ingreso"?"Ingreso":"Egreso",t.moneda||"ARS",t.monto||0,t.esComision?"Sí":"No"];});

  const convHtml = _showConv && RATES ? `

  <div style="overflow-x:auto;">
    <table style="width:100%;border-collapse:collapse;">
      <thead><tr style="background:#F2EDE4;">${["Fecha","Propiedad","Categoría","Descripción","Tipo","Monto",""].map(h=>`<th style="${thStyle()}">${h}</th>`).join("")}</tr></thead>

window.updateConv = function(){
  const amt=parseFloat(document.getElementById("cv-amt")?.value)||0;
  const from=document.getElementById("cv-from")?.value;
  const to=document.getElementById("cv-to")?.value;
  if(!RATES)return;
  const getR=c=>{if(c==="ARS")return 1;if(c==="USD")return RATES.blue?.venta||null;if(c==="BRL")return RATES.brl?.venta||null;return null;};
  const rF=getR(from),rT=getR(to);
  const res=rF&&rT?(from==="ARS"?amt:amt*rF)/rT*(to==="ARS"?rT:1):null;
  const el=document.getElementById("cv-res");
  if(el) el.innerHTML=`<span style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:#B8922A;">${res!=null?fmtM(res,to):"—"}</span>`;
};
window.openTxForm = function(id){
  const tx=id?DATA.transacciones.find(x=>x.id===id):{id:uid(),fecha:today(),tipo:"ingreso",propiedadId:"",categoria:"",monto:"",moneda:"ARS",descripcion:"",esComision:false,montoTotal:"",montoTransferido:""};
  const isCats=(tipo)=>(tipo==="ingreso"?DATA.tiposIngreso:DATA.tiposGasto).map(c=>`<option${tx.categoria===c?" selected":""}>${c}</option>`).join("");
  showModal(id?"Editar movimiento":"Nuevo movimiento",`
  <div id="txf">
  ${g2(`
    ${fldHtml("Fecha",`<input id="tx-f" type="date" style="${iSt()}" value="${tx.fecha}"/>`)}
    ${fldHtml("Tipo",`<select id="tx-ti" style="${iSt()}" onchange="updateTxCats()">${["ingreso","egreso"].map(v=>`<option value="${v}"${tx.tipo===v?" selected":""}>${v==="ingreso"?"↑ Ingreso":"↓ Egreso"}</option>`).join("")}</select>`)}
    ${fldHtml("Propiedad",`<select id="tx-p" style="${iSt()}" onchange="updateTxGest()"><option value="">Sin asignar</option>${DATA.propiedades.map(p=>`<option value="${p.id}"${tx.propiedadId===p.id?" selected":""}>${esc(p.nombre)}${p.ownership==="gestionada"?" 🏢":""}</option>`).join("")}</select>`)}
    ${fldHtml("Categoría",`<select id="tx-cat" style="${iSt()}">${isCats(tx.tipo)}</select>`)}
    ${fldHtml("Monto",`<input id="tx-m" type="number" style="${iSt()}" value="${tx.monto||""}"/>`)}
    ${fldHtml("Moneda",`<select id="tx-mo" style="${iSt()}"><option value="ARS"${tx.moneda==="ARS"?" selected":""}>$ ARS</option><option value="USD"${tx.moneda==="USD"?" selected":""}>USD</option><option value="BRL"${tx.moneda==="BRL"?" selected":""}>R$ BRL</option></select>`)}
    <div id="tx-gest-fields" style="grid-column:span 2;display:grid;grid-template-columns:1fr 1fr;gap:12px;"></div>
    ${fldHtml("Descripción",`<input id="tx-desc" style="${iSt()}" value="${esc(tx.descripcion)}" placeholder="Descripción opcional"/>`,true)}
  `)}
  ${formActions(`saveTx('${tx.id}')`)}
  </div>`,true);
  updateTxGest(tx);
};
window.updateTxCats = function(){
  const tipo=document.getElementById("tx-ti")?.value||"ingreso";
  const cats=tipo==="ingreso"?DATA.tiposIngreso:DATA.tiposGasto;
  const el=document.getElementById("tx-cat");
  if(el) el.innerHTML=cats.map(c=>`<option>${c}</option>`).join("");
};
window.updateTxGest = function(init){
  const pid=document.getElementById("tx-p")?.value;
  const prop=pid?DATA.propiedades.find(p=>p.id===pid):null;
  const el=document.getElementById("tx-gest-fields");
  if(!el)return;
  if(!prop||prop.ownership!=="gestionada"){el.innerHTML="";return;}
  const tipo=document.getElementById("tx-ti")?.value||"ingreso";
  const ec=init?.esComision||false;
  el.innerHTML=`
    <div style="grid-column:span 2;background:#F0EAFA;border:1px solid rgba(96,64,160,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:#6040A0;">
      <strong>Propiedad gestionada</strong> · ${prop.modoGestion==="cobrador"?"Cobrador":"Comisionista"}${prop.comisionPct?` · Comisión: ${prop.comisionPct}%`:""}
    </div>
    ${prop.modoGestion==="cobrador"&&tipo==="ingreso"?`
      ${fldHtml("Total cobrado al inquilino",`<input id="tx-tot" type="number" style="${iSt()}" value="${init?.montoTotal||""}"/>`)}
      ${fldHtml("A transferir al dueño",`<input id="tx-trf" type="number" style="${iSt()}" value="${init?.montoTransferido||""}"/>`)}`:""}
    <div style="grid-column:span 2">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#1C1810;">
        <input type="checkbox" id="tx-ec" ${ec?"checked":""}/>
        ¿Este monto es nuestra comisión/honorario?
      </label>
    </div>`;
};
window.saveTx = async function(id){
  const m=parseFloat(document.getElementById("tx-m")?.value);
  if(!m){alert("Ingresá un monto.");return;}
  const f={id,fecha:document.getElementById("tx-f").value,tipo:document.getElementById("tx-ti").value,propiedadId:document.getElementById("tx-p").value,categoria:document.getElementById("tx-cat").value,monto:m,moneda:document.getElementById("tx-mo").value,descripcion:document.getElementById("tx-desc").value,esComision:document.getElementById("tx-ec")?.checked||false,montoTotal:parseFloat(document.getElementById("tx-tot")?.value)||0,montoTransferido:parseFloat(document.getElementById("tx-trf")?.value)||0};
  await save({...DATA,transacciones:DATA.transacciones.some(x=>x.id===id)?DATA.transacciones.map(x=>x.id===id?f:x):[...DATA.transacciones,f]});
  closeModal();
};
window.delTx = async function(id){if(!confirm("¿Eliminar?"))return;await save({...DATA,transacciones:DATA.transacciones.filter(t=>t.id!==id)});};

    <strong>Gestores externos</strong> = terceros que nos ayudan (inmobiliarias, property managers que nosotros contratamos). Distintos de los <strong style="color:#6040A0;">Clientes</strong> (dueños que nos contratan a nosotros).

window.openAdmForm = function(id){

window.saveAdm = async function(id){

  await save({...DATA,administradores:DATA.administradores.some(x=>x.id===id)?DATA.administradores.map(x=>x.id===id?f:x):[...DATA.administradores,f]});

};
window.delAdm = async function(id){if(!confirm("¿Eliminar?"))return;await save({...DATA,administradores:DATA.administradores.filter(a=>a.id!==id)});};

function tabConfig(){
  const ed=(title,items,tipo,color)=>`
    ${card(`<div style="padding:18px 20px;">
      <h3 style="font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;margin-bottom:14px;color:${color};">${esc(title)} <span style="font-size:12px;color:#9A8E7A;font-family:'DM Sans',sans-serif;font-weight:400;">(${items.length})</span></h3>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
        ${items.map(it=>`<div style="display:flex;align-items:center;background:#F2EDE4;border:1px solid #E2D9CC;border-radius:20px;overflow:hidden;">
          <span style="padding:4px 10px 4px 12px;font-size:12px;color:#5A5040;">${esc(it)}</span>
          <button onclick="delCategoria('${tipo}','${esc(it).replace(/'/g,"\\'")}',this)" style="background:none;border:none;cursor:pointer;color:#B84040;padding:4px 8px;display:flex;">${svgIcon(`<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`,11)}</button>
        </div>`).join("")}
      </div>
      <div style="display:flex;gap:8px;">
        <input id="cfg-new-${tipo}" style="${iSt("flex:1;")}" placeholder="Nuevo tipo..." onkeydown="if(event.key==='Enter')addCategoria('${tipo}')"/>
        <button onclick="addCategoria('${tipo}')" style="background:linear-gradient(135deg,#C8A96E,#B8922A);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;">+ Agregar</button>
      </div>
    </div>`)}`;

  return`
  <h2 style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;margin-bottom:20px;">Configuración</h2>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;margin-bottom:16px;">
    ${ed("Tipos de egreso",DATA.tiposGasto,"gasto","#B84040")}
    ${ed("Tipos de ingreso",DATA.tiposIngreso,"ingreso","#2D7A4F")}
  </div>
  ${card(`<div style="padding:20px 22px;background:#FBF6EC;border-radius:12px;">
    <h3 style="font-family:'Cormorant Garamond',serif;font-size:16px;margin-bottom:10px;display:flex;align-items:center;gap:8px;">🔑 Estado de Firebase</h3>
    <p style="font-size:12px;color:#5A5040;line-height:1.8;">
      ${DEMO?`<strong style="color:#A06010;">⚠ Modo demo</strong> — los datos se guardan solo en este navegador (localStorage).<br/>Para activar Firebase y sincronizar entre dispositivos, editá el bloque <code style="background:#fff;padding:1px 5px;border-radius:4px;">firebaseConfig</code> al inicio del archivo HTML con tus credenciales.`
            :`<strong style="color:#2D7A4F;">✓ Firebase conectado</strong> — datos sincronizados en la nube.${USER?` Usuario: ${esc(USER.email)}`:""}` }
    </p>
  </div>`)}`;
}
window.addCategoria = async function(tipo){
  const el=document.getElementById(`cfg-new-${tipo}`);
  const v=el?.value.trim();
  if(!v)return;
  const key=tipo==="gasto"?"tiposGasto":"tiposIngreso";
  if(DATA[key].includes(v)){alert("Ya existe.");return;}
  await save({...DATA,[key]:[...DATA[key],v]});
  el.value="";
};
window.delCategoria = async function(tipo,val){
  const key=tipo==="gasto"?"tiposGasto":"tiposIngreso";
  if(!confirm(`¿Eliminar "${val}"?`))return;
  await save({...DATA,[key]:DATA[key].filter(x=>x!==val)});
};
